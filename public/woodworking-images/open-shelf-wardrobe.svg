<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f6f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="oak" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DEB887;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F5DEB3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DEB887;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightOak" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5DEB3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFF8DC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5DEB3;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="mirror" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#E6F3FF;stop-opacity:0.6" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  
  <!-- Floor -->
  <rect x="0" y="700" width="1200" height="100" fill="#D2B48C"/>
  
  <!-- Main Wardrobe Structure -->
  <rect x="150" y="150" width="900" height="500" fill="url(#oak)" stroke="#8B7355" stroke-width="3"/>
  
  <!-- Open Shelves - Left Section -->
  <rect x="170" y="170" width="250" height="40" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="170" y="230" width="250" height="40" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="170" y="290" width="250" height="40" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="170" y="350" width="250" height="40" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="170" y="410" width="250" height="40" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="170" y="470" width="250" height="40" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Open Shelves - Right Section -->
  <rect x="780" y="170" width="250" height="40" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="780" y="230" width="250" height="40" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="780" y="290" width="250" height="40" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="780" y="350" width="250" height="40" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="780" y="410" width="250" height="40" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="780" y="470" width="250" height="40" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Central Mirror -->
  <rect x="450" y="200" width="300" height="300" fill="url(#mirror)" stroke="#8B7355" stroke-width="2"/>
  <rect x="460" y="210" width="280" height="280" fill="#E6F3FF" opacity="0.3"/>
  
  <!-- Hanging Rods -->
  <rect x="180" y="190" width="230" height="3" fill="#8B7355"/>
  <rect x="180" y="250" width="230" height="3" fill="#8B7355"/>
  <rect x="180" y="310" width="230" height="3" fill="#8B7355"/>
  <rect x="180" y="370" width="230" height="3" fill="#8B7355"/>
  <rect x="180" y="430" width="230" height="3" fill="#8B7355"/>
  <rect x="180" y="490" width="230" height="3" fill="#8B7355"/>
  
  <rect x="790" y="190" width="230" height="3" fill="#8B7355"/>
  <rect x="790" y="250" width="230" height="3" fill="#8B7355"/>
  <rect x="790" y="310" width="230" height="3" fill="#8B7355"/>
  <rect x="790" y="370" width="230" height="3" fill="#8B7355"/>
  <rect x="790" y="430" width="230" height="3" fill="#8B7355"/>
  <rect x="790" y="490" width="230" height="3" fill="#8B7355"/>
  
  <!-- Bottom Drawers -->
  <rect x="400" y="550" width="400" height="100" fill="url(#oak)" stroke="#8B7355" stroke-width="2"/>
  
  <!-- Drawer Divisions -->
  <rect x="420" y="570" width="80" height="60" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="520" y="570" width="80" height="60" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="620" y="570" width="80" height="60" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="720" y="570" width="80" height="60" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Drawer Handles -->
  <rect x="440" y="595" width="40" height="4" fill="#FFD700"/>
  <rect x="540" y="595" width="40" height="4" fill="#FFD700"/>
  <rect x="640" y="595" width="40" height="4" fill="#FFD700"/>
  <rect x="740" y="595" width="40" height="4" fill="#FFD700"/>
  
  <!-- Left Side Drawers -->
  <rect x="170" y="550" width="250" height="100" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="190" y="570" width="70" height="40" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="280" y="570" width="70" height="40" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="190" y="620" width="70" height="20" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="280" y="620" width="70" height="20" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Right Side Drawers -->
  <rect x="780" y="550" width="250" height="100" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="800" y="570" width="70" height="40" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="890" y="570" width="70" height="40" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="800" y="620" width="70" height="20" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="890" y="620" width="70" height="20" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Ceiling -->
  <rect x="0" y="0" width="1200" height="100" fill="#F5F5DC"/>
  
  <!-- Ceiling Lights -->
  <circle cx="200" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  <circle cx="400" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  <circle cx="600" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  <circle cx="800" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  <circle cx="1000" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  
  <!-- Wood Grain Details -->
  <path d="M 180 200 Q 200 190 220 200 Q 240 210 260 200 Q 280 190 300 200" stroke="#8B7355" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 180 300 Q 200 290 220 300 Q 240 310 260 300 Q 280 290 300 300" stroke="#8B7355" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 180 400 Q 200 390 220 400 Q 240 410 260 400 Q 280 390 300 400" stroke="#8B7355" stroke-width="1" fill="none" opacity="0.4"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#8B7355">خزانة ملابس فاخرة مع رفوف مفتوحة</text>
</svg>
