<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f6f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="walnut" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3E2723;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5D4037;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3E2723;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="led" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#0080FF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#00FFFF;stop-opacity:0.8" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  
  <!-- Floor -->
  <rect x="0" y="700" width="1200" height="100" fill="#D2B48C"/>
  
  <!-- Left Wall Wardrobe -->
  <rect x="100" y="150" width="250" height="500" fill="url(#walnut)" stroke="#1B0F00" stroke-width="3"/>
  <rect x="120" y="170" width="210" height="60" fill="url(#led)" opacity="0.7"/>
  <rect x="120" y="250" width="210" height="60" fill="url(#led)" opacity="0.7"/>
  <rect x="120" y="330" width="210" height="60" fill="url(#led)" opacity="0.7"/>
  <rect x="120" y="410" width="210" height="60" fill="url(#led)" opacity="0.7"/>
  <rect x="120" y="490" width="210" height="60" fill="url(#led)" opacity="0.7"/>
  <rect x="120" y="570" width="210" height="60" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  
  <!-- Right Wall Wardrobe -->
  <rect x="850" y="150" width="250" height="500" fill="url(#walnut)" stroke="#1B0F00" stroke-width="3"/>
  <rect x="870" y="170" width="210" height="60" fill="url(#led)" opacity="0.7"/>
  <rect x="870" y="250" width="210" height="60" fill="url(#led)" opacity="0.7"/>
  <rect x="870" y="330" width="210" height="60" fill="url(#led)" opacity="0.7"/>
  <rect x="870" y="410" width="210" height="60" fill="url(#led)" opacity="0.7"/>
  <rect x="870" y="490" width="210" height="60" fill="url(#led)" opacity="0.7"/>
  <rect x="870" y="570" width="210" height="60" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  
  <!-- Back Wall Wardrobe -->
  <rect x="400" y="150" width="400" height="500" fill="url(#walnut)" stroke="#1B0F00" stroke-width="3"/>
  
  <!-- Central Mirror -->
  <rect x="450" y="200" width="300" height="300" fill="url(#glow)" stroke="#1B0F00" stroke-width="2"/>
  <rect x="460" y="210" width="280" height="280" fill="#E6F3FF" opacity="0.3"/>
  
  <!-- LED Strips -->
  <rect x="440" y="180" width="320" height="8" fill="url(#led)" opacity="0.9"/>
  <rect x="440" y="512" width="320" height="8" fill="url(#led)" opacity="0.9"/>
  <rect x="440" y="200" width="8" height="300" fill="url(#led)" opacity="0.9"/>
  <rect x="752" y="200" width="8" height="300" fill="url(#led)" opacity="0.9"/>
  
  <!-- Drawers -->
  <rect x="450" y="520" width="300" height="120" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="470" y="540" width="60" height="80" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="550" y="540" width="60" height="80" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="630" y="540" width="60" height="80" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="710" y="540" width="60" height="80" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  
  <!-- Drawer Handles -->
  <rect x="490" y="575" width="20" height="4" fill="#FFD700"/>
  <rect x="570" y="575" width="20" height="4" fill="#FFD700"/>
  <rect x="650" y="575" width="20" height="4" fill="#FFD700"/>
  <rect x="730" y="575" width="20" height="4" fill="#FFD700"/>
  
  <!-- Ceiling -->
  <rect x="0" y="0" width="1200" height="100" fill="#F5F5DC"/>
  
  <!-- Ceiling Lights -->
  <circle cx="200" cy="80" r="20" fill="url(#led)" opacity="0.6"/>
  <circle cx="400" cy="80" r="20" fill="url(#led)" opacity="0.6"/>
  <circle cx="600" cy="80" r="20" fill="url(#led)" opacity="0.6"/>
  <circle cx="800" cy="80" r="20" fill="url(#led)" opacity="0.6"/>
  <circle cx="1000" cy="80" r="20" fill="url(#led)" opacity="0.6"/>
  
  <!-- Wood Grain Details -->
  <path d="M 110 200 Q 130 190 150 200 Q 170 210 190 200 Q 210 190 230 200" stroke="#1B0F00" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 110 300 Q 130 290 150 300 Q 170 310 190 300 Q 210 290 230 300" stroke="#1B0F00" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 110 400 Q 130 390 150 400 Q 170 410 190 400 Q 210 390 230 400" stroke="#1B0F00" stroke-width="1" fill="none" opacity="0.4"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1B0F00">خزانة ملابس فاخرة مع إضاءة LED متكاملة</text>
</svg>
