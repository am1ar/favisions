<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f6f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="walnut" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3E2723;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5D4037;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3E2723;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#FF8C42;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="cool" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#44A08D;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#4ECDC4;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF69B4;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#FF1493;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:0.8" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  
  <!-- Floor -->
  <rect x="0" y="700" width="1200" height="100" fill="#D2B48C"/>
  
  <!-- Main Wardrobe Structure -->
  <rect x="200" y="150" width="800" height="500" fill="url(#walnut)" stroke="#1B0F00" stroke-width="3"/>
  
  <!-- Left Section - Warm Colors -->
  <rect x="220" y="170" width="200" height="60" fill="url(#warm)" opacity="0.9"/>
  <rect x="220" y="250" width="200" height="60" fill="url(#warm)" opacity="0.9"/>
  <rect x="220" y="330" width="200" height="60" fill="url(#warm)" opacity="0.9"/>
  <rect x="220" y="410" width="200" height="60" fill="url(#warm)" opacity="0.9"/>
  <rect x="220" y="490" width="200" height="60" fill="url(#warm)" opacity="0.9"/>
  <rect x="220" y="570" width="200" height="60" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  
  <!-- Center Section - Cool Colors -->
  <rect x="440" y="170" width="320" height="60" fill="url(#cool)" opacity="0.9"/>
  <rect x="440" y="250" width="320" height="60" fill="url(#cool)" opacity="0.9"/>
  <rect x="440" y="330" width="320" height="60" fill="url(#cool)" opacity="0.9"/>
  <rect x="440" y="410" width="320" height="60" fill="url(#cool)" opacity="0.9"/>
  <rect x="440" y="490" width="320" height="60" fill="url(#cool)" opacity="0.9"/>
  <rect x="440" y="570" width="320" height="60" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  
  <!-- Right Section - Pink Colors -->
  <rect x="780" y="170" width="200" height="60" fill="url(#pink)" opacity="0.9"/>
  <rect x="780" y="250" width="200" height="60" fill="url(#pink)" opacity="0.9"/>
  <rect x="780" y="330" width="200" height="60" fill="url(#pink)" opacity="0.9"/>
  <rect x="780" y="410" width="200" height="60" fill="url(#pink)" opacity="0.9"/>
  <rect x="780" y="490" width="200" height="60" fill="url(#pink)" opacity="0.9"/>
  <rect x="780" y="570" width="200" height="60" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  
  <!-- Central Mirror -->
  <rect x="500" y="200" width="200" height="250" fill="url(#glow)" stroke="#1B0F00" stroke-width="2"/>
  <rect x="510" y="210" width="180" height="230" fill="#E6F3FF" opacity="0.3"/>
  
  <!-- LED Control Panel -->
  <rect x="450" y="650" width="300" height="80" fill="url(#walnut)" stroke="#1B0F00" stroke-width="2"/>
  <circle cx="500" cy="690" r="15" fill="url(#warm)" opacity="0.9"/>
  <circle cx="550" cy="690" r="15" fill="url(#cool)" opacity="0.9"/>
  <circle cx="600" cy="690" r="15" fill="url(#pink)" opacity="0.9"/>
  <circle cx="650" cy="690" r="15" fill="#FFD700" opacity="0.9"/>
  <circle cx="700" cy="690" r="15" fill="#00FF00" opacity="0.9"/>
  
  <!-- Drawers -->
  <rect x="220" y="650" width="200" height="80" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="780" y="650" width="200" height="80" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  
  <!-- Drawer Handles -->
  <rect x="300" y="685" width="40" height="4" fill="#FFD700"/>
  <rect x="860" y="685" width="40" height="4" fill="#FFD700"/>
  
  <!-- Ceiling -->
  <rect x="0" y="0" width="1200" height="100" fill="#F5F5DC"/>
  
  <!-- Ceiling Lights -->
  <circle cx="200" cy="80" r="20" fill="url(#warm)" opacity="0.6"/>
  <circle cx="400" cy="80" r="20" fill="url(#cool)" opacity="0.6"/>
  <circle cx="600" cy="80" r="20" fill="url(#pink)" opacity="0.6"/>
  <circle cx="800" cy="80" r="20" fill="url(#warm)" opacity="0.6"/>
  <circle cx="1000" cy="80" r="20" fill="url(#cool)" opacity="0.6"/>
  
  <!-- Color Changing Animation Effect -->
  <circle cx="600" cy="400" r="100" fill="none" stroke="url(#warm)" stroke-width="3" opacity="0.3">
    <animate attributeName="stroke" values="url(#warm);url(#cool);url(#pink);url(#warm)" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Wood Grain Details -->
  <path d="M 230 200 Q 250 190 270 200 Q 290 210 310 200 Q 330 190 350 200" stroke="#1B0F00" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 230 300 Q 250 290 270 300 Q 290 310 310 300 Q 330 290 350 300" stroke="#1B0F00" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 230 400 Q 250 390 270 400 Q 290 410 310 400 Q 330 390 350 400" stroke="#1B0F00" stroke-width="1" fill="none" opacity="0.4"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1B0F00">خزانة ملابس حديثة مع إضاءة متعددة الألوان</text>
</svg>
