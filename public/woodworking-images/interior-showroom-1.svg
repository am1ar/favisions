<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f6f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A0522D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6F3FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#B3D9FF;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  
  <!-- Floor -->
  <rect x="0" y="700" width="1200" height="100" fill="#D2B48C"/>
  
  <!-- Left Wall Wooden Units -->
  <rect x="50" y="100" width="300" height="600" fill="url(#wood)" stroke="#654321" stroke-width="2"/>
  <rect x="70" y="120" width="260" height="80" fill="url(#glass)" stroke="#654321" stroke-width="1"/>
  <rect x="70" y="220" width="260" height="80" fill="url(#glass)" stroke="#654321" stroke-width="1"/>
  <rect x="70" y="320" width="260" height="80" fill="url(#glass)" stroke="#654321" stroke-width="1"/>
  <rect x="70" y="420" width="260" height="80" fill="url(#glass)" stroke="#654321" stroke-width="1"/>
  <rect x="70" y="520" width="260" height="80" fill="url(#glass)" stroke="#654321" stroke-width="1"/>
  <rect x="70" y="620" width="260" height="60" fill="url(#wood)" stroke="#654321" stroke-width="1"/>
  
  <!-- Right Wall Wooden Units -->
  <rect x="850" y="100" width="300" height="600" fill="url(#wood)" stroke="#654321" stroke-width="2"/>
  <rect x="870" y="120" width="260" height="80" fill="url(#glass)" stroke="#654321" stroke-width="1"/>
  <rect x="870" y="220" width="260" height="80" fill="url(#glass)" stroke="#654321" stroke-width="1"/>
  <rect x="870" y="320" width="260" height="80" fill="url(#glass)" stroke="#654321" stroke-width="1"/>
  <rect x="870" y="420" width="260" height="80" fill="url(#glass)" stroke="#654321" stroke-width="1"/>
  <rect x="870" y="520" width="260" height="80" fill="url(#glass)" stroke="#654321" stroke-width="1"/>
  <rect x="870" y="620" width="260" height="60" fill="url(#wood)" stroke="#654321" stroke-width="1"/>
  
  <!-- Central Display Area -->
  <rect x="400" y="150" width="400" height="500" fill="url(#wood)" stroke="#654321" stroke-width="3"/>
  <rect x="420" y="170" width="360" height="100" fill="url(#glass)" stroke="#654321" stroke-width="1"/>
  <rect x="420" y="290" width="360" height="100" fill="url(#glass)" stroke="#654321" stroke-width="1"/>
  <rect x="420" y="410" width="360" height="100" fill="url(#glass)" stroke="#654321" stroke-width="1"/>
  <rect x="420" y="530" width="360" height="100" fill="url(#wood)" stroke="#654321" stroke-width="1"/>
  
  <!-- Integrated Door -->
  <rect x="550" y="200" width="100" height="200" fill="url(#wood)" stroke="#654321" stroke-width="2"/>
  <circle cx="630" cy="300" r="8" fill="#FFD700"/>
  
  <!-- Ceiling -->
  <rect x="0" y="0" width="1200" height="100" fill="#F5F5DC"/>
  
  <!-- Lighting -->
  <circle cx="200" cy="80" r="15" fill="#FFD700" opacity="0.8"/>
  <circle cx="400" cy="80" r="15" fill="#FFD700" opacity="0.8"/>
  <circle cx="600" cy="80" r="15" fill="#FFD700" opacity="0.8"/>
  <circle cx="800" cy="80" r="15" fill="#FFD700" opacity="0.8"/>
  <circle cx="1000" cy="80" r="15" fill="#FFD700" opacity="0.8"/>
  
  <!-- Wood Grain Details -->
  <path d="M 60 150 Q 80 140 100 150 Q 120 160 140 150 Q 160 140 180 150" stroke="#654321" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M 60 250 Q 80 240 100 250 Q 120 260 140 250 Q 160 240 180 250" stroke="#654321" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M 60 350 Q 80 340 100 350 Q 120 360 140 350 Q 160 340 180 350" stroke="#654321" stroke-width="1" fill="none" opacity="0.3"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#654321">معرض داخلي فاخر مع وحدات خشبية مدمجة</text>
</svg>
