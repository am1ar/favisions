<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f6f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="walnut" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3E2723;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5D4037;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3E2723;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="mirror" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#E6F3FF;stop-opacity:0.6" />
    </radialGradient>
    <linearGradient id="led" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  
  <!-- Floor -->
  <rect x="0" y="700" width="1200" height="100" fill="#D2B48C"/>
  
  <!-- Wall -->
  <rect x="0" y="0" width="1200" height="700" fill="#F5F5DC"/>
  
  <!-- Vanity Table Structure -->
  <rect x="300" y="400" width="600" height="200" fill="url(#walnut)" stroke="#1B0F00" stroke-width="3"/>
  
  <!-- Table Top -->
  <rect x="320" y="400" width="560" height="30" fill="url(#walnut)" stroke="#1B0F00" stroke-width="2"/>
  
  <!-- Table Legs -->
  <rect x="350" y="630" width="20" height="70" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="450" y="630" width="20" height="70" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="730" y="630" width="20" height="70" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="830" y="630" width="20" height="70" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  
  <!-- Large Curved Mirror -->
  <path d="M 400 200 Q 600 150 800 200 Q 600 250 400 200 Z" fill="url(#mirror)" stroke="url(#gold)" stroke-width="4"/>
  <path d="M 420 210 Q 600 170 780 210 Q 600 240 420 210 Z" fill="#E6F3FF" opacity="0.3"/>
  
  <!-- LED Lighting Around Mirror -->
  <path d="M 400 200 Q 600 150 800 200" fill="none" stroke="url(#led)" stroke-width="8" opacity="0.8"/>
  <path d="M 400 200 Q 600 250 800 200" fill="none" stroke="url(#led)" stroke-width="8" opacity="0.8"/>
  
  <!-- LED Light Bulbs -->
  <circle cx="420" cy="200" r="8" fill="url(#led)" opacity="0.9"/>
  <circle cx="500" cy="180" r="8" fill="url(#led)" opacity="0.9"/>
  <circle cx="600" cy="170" r="8" fill="url(#led)" opacity="0.9"/>
  <circle cx="700" cy="180" r="8" fill="url(#led)" opacity="0.9"/>
  <circle cx="780" cy="200" r="8" fill="url(#led)" opacity="0.9"/>
  
  <circle cx="420" cy="200" r="8" fill="url(#led)" opacity="0.9"/>
  <circle cx="500" cy="220" r="8" fill="url(#led)" opacity="0.9"/>
  <circle cx="600" cy="230" r="8" fill="url(#led)" opacity="0.9"/>
  <circle cx="700" cy="220" r="8" fill="url(#led)" opacity="0.9"/>
  <circle cx="780" cy="200" r="8" fill="url(#led)" opacity="0.9"/>
  
  <!-- Drawers -->
  <rect x="350" y="450" width="80" height="120" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="450" y="450" width="80" height="120" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="670" y="450" width="80" height="120" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="770" y="450" width="80" height="120" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  
  <!-- Drawer Handles -->
  <rect x="380" y="500" width="20" height="4" fill="url(#gold)"/>
  <rect x="480" y="500" width="20" height="4" fill="url(#gold)"/>
  <rect x="700" y="500" width="20" height="4" fill="url(#gold)"/>
  <rect x="800" y="500" width="20" height="4" fill="url(#gold)"/>
  
  <!-- Center Storage Section -->
  <rect x="550" y="450" width="100" height="120" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="570" y="470" width="60" height="80" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  
  <!-- Center Drawer Handle -->
  <rect x="580" y="500" width="40" height="4" fill="url(#gold)"/>
  
  <!-- Decorative Elements -->
  <path d="M 400 200 L 420 180 L 440 200" fill="url(#gold)" stroke="#1B0F00" stroke-width="2"/>
  <path d="M 760 200 L 780 180 L 800 200" fill="url(#gold)" stroke="#1B0F00" stroke-width="2"/>
  
  <!-- Mirror Reflections -->
  <path d="M 450 190 L 470 190 L 470 210 L 450 210 Z" fill="#FFFFFF" opacity="0.4"/>
  <path d="M 500 180 L 520 180 L 520 200 L 500 200 Z" fill="#FFFFFF" opacity="0.4"/>
  <path d="M 600 170 L 620 170 L 620 190 L 600 190 Z" fill="#FFFFFF" opacity="0.4"/>
  
  <!-- Ceiling -->
  <rect x="0" y="0" width="1200" height="100" fill="#F5F5DC"/>
  
  <!-- Ceiling Lights -->
  <circle cx="200" cy="80" r="20" fill="url(#led)" opacity="0.6"/>
  <circle cx="400" cy="80" r="20" fill="url(#led)" opacity="0.6"/>
  <circle cx="600" cy="80" r="20" fill="url(#led)" opacity="0.6"/>
  <circle cx="800" cy="80" r="20" fill="url(#led)" opacity="0.6"/>
  <circle cx="1000" cy="80" r="20" fill="url(#led)" opacity="0.6"/>
  
  <!-- Wood Grain Details -->
  <path d="M 330 450 Q 350 440 370 450 Q 390 460 410 450 Q 430 440 450 450" stroke="#1B0F00" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 330 500 Q 350 490 370 500 Q 390 510 410 500 Q 430 490 450 500" stroke="#1B0F00" stroke-width="1" fill="none" opacity="0.4"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1B0F00">طاولة تجميل فاخرة مع مرآة مضاءة</text>
</svg>
