<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f6f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="oak" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DEB887;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F5DEB3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DEB887;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightOak" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5DEB3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFF8DC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5DEB3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wall" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5F5DC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E6E6FA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  
  <!-- Floor -->
  <rect x="0" y="700" width="1200" height="100" fill="#D2B48C"/>
  
  <!-- Wall -->
  <rect x="0" y="0" width="1200" height="700" fill="url(#wall)"/>
  
  <!-- Integrated Cabinets - Full Wall Width -->
  <rect x="50" y="200" width="1100" height="400" fill="url(#oak)" stroke="#8B7355" stroke-width="3"/>
  
  <!-- Upper Cabinets -->
  <rect x="70" y="220" width="200" height="120" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="290" y="220" width="200" height="120" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="510" y="220" width="200" height="120" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="730" y="220" width="200" height="120" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="950" y="220" width="160" height="120" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Upper Cabinet Doors -->
  <rect x="80" y="230" width="180" height="100" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="300" y="230" width="180" height="100" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="520" y="230" width="180" height="100" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="740" y="230" width="180" height="100" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="960" y="230" width="140" height="100" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Upper Cabinet Handles -->
  <rect x="160" y="275" width="20" height="2" fill="#FFD700"/>
  <rect x="380" y="275" width="20" height="2" fill="#FFD700"/>
  <rect x="600" y="275" width="20" height="2" fill="#FFD700"/>
  <rect x="820" y="275" width="20" height="2" fill="#FFD700"/>
  <rect x="1030" y="275" width="20" height="2" fill="#FFD700"/>
  
  <!-- Middle Section - Open Shelves -->
  <rect x="70" y="360" width="200" height="80" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="290" y="360" width="200" height="80" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="510" y="360" width="200" height="80" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="730" y="360" width="200" height="80" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="950" y="360" width="160" height="80" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Shelf Dividers -->
  <rect x="170" y="360" width="2" height="80" fill="#8B7355"/>
  <rect x="390" y="360" width="2" height="80" fill="#8B7355"/>
  <rect x="610" y="360" width="2" height="80" fill="#8B7355"/>
  <rect x="830" y="360" width="2" height="80" fill="#8B7355"/>
  <rect x="1030" y="360" width="2" height="80" fill="#8B7355"/>
  
  <!-- Lower Cabinets -->
  <rect x="70" y="460" width="200" height="120" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="290" y="460" width="200" height="120" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="510" y="460" width="200" height="120" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="730" y="460" width="200" height="120" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="950" y="460" width="160" height="120" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Lower Cabinet Doors -->
  <rect x="80" y="470" width="180" height="100" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="300" y="470" width="180" height="100" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="520" y="470" width="180" height="100" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="740" y="470" width="180" height="100" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="960" y="470" width="140" height="100" fill="url(#oak)" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Lower Cabinet Handles -->
  <rect x="160" y="515" width="20" height="2" fill="#FFD700"/>
  <rect x="380" y="515" width="20" height="2" fill="#FFD700"/>
  <rect x="600" y="515" width="20" height="2" fill="#FFD700"/>
  <rect x="820" y="515" width="20" height="2" fill="#FFD700"/>
  <rect x="1030" y="515" width="20" height="2" fill="#FFD700"/>
  
  <!-- Utility Sink -->
  <rect x="400" y="500" width="120" height="80" fill="#C0C0C0" stroke="#808080" stroke-width="2"/>
  <rect x="410" y="510" width="100" height="60" fill="#E6F3FF" opacity="0.8"/>
  
  <!-- Sink Faucet -->
  <rect x="455" y="480" width="10" height="30" fill="#C0C0C0" stroke="#808080" stroke-width="1"/>
  <circle cx="460" cy="475" r="8" fill="#C0C0C0" stroke="#808080" stroke-width="1"/>
  
  <!-- Washing Machine Space -->
  <rect x="600" y="500" width="80" height="80" fill="#E6E6FA" stroke="#8B7355" stroke-width="2"/>
  <rect x="610" y="510" width="60" height="60" fill="#F0F0F0" opacity="0.8"/>
  
  <!-- Drying Rack -->
  <rect x="750" y="500" width="100" height="60" fill="url(#lightOak)" stroke="#8B7355" stroke-width="1"/>
  <rect x="760" y="510" width="80" height="40" fill="none" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Hanging Rods -->
  <rect x="760" y="520" width="80" height="2" fill="#8B7355"/>
  <rect x="760" y="530" width="80" height="2" fill="#8B7355"/>
  <rect x="760" y="540" width="80" height="2" fill="#8B7355"/>
  
  <!-- Ceiling -->
  <rect x="0" y="0" width="1200" height="100" fill="#F5F5DC"/>
  
  <!-- Ceiling Lights -->
  <circle cx="200" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  <circle cx="400" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  <circle cx="600" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  <circle cx="800" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  <circle cx="1000" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  
  <!-- Wood Grain Details -->
  <path d="M 80 250 Q 100 240 120 250 Q 140 260 160 250 Q 180 240 200 250" stroke="#8B7355" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M 80 350 Q 100 340 120 350 Q 140 360 160 350 Q 180 340 200 350" stroke="#8B7355" stroke-width="1" fill="none" opacity="0.3"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#8B7355">غرفة مرافق مع خزائن خشبية مدمجة</text>
</svg>
