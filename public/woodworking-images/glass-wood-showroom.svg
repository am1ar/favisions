<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f6f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A0522D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6F3FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#B3D9FF;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="diningTable" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DEB887;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F5DEB3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DEB887;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  
  <!-- Floor -->
  <rect x="0" y="700" width="1200" height="100" fill="#D2B48C"/>
  
  <!-- Left Wall with Wooden Doors -->
  <rect x="50" y="100" width="300" height="600" fill="url(#wood)" stroke="#654321" stroke-width="2"/>
  
  <!-- Wooden Door 1 -->
  <rect x="70" y="120" width="120" height="200" fill="url(#wood)" stroke="#654321" stroke-width="2"/>
  <circle cx="170" cy="220" r="8" fill="#FFD700"/>
  
  <!-- Wooden Door 2 -->
  <rect x="210" y="120" width="120" height="200" fill="url(#wood)" stroke="#654321" stroke-width="2"/>
  <circle cx="270" cy="220" r="8" fill="#FFD700"/>
  
  <!-- Glass Door 1 -->
  <rect x="70" y="340" width="120" height="200" fill="url(#glass)" stroke="#654321" stroke-width="2"/>
  <rect x="80" y="350" width="100" height="180" fill="#E6F3FF" opacity="0.3"/>
  
  <!-- Glass Door 2 -->
  <rect x="210" y="340" width="120" height="200" fill="url(#glass)" stroke="#654321" stroke-width="2"/>
  <rect x="220" y="350" width="100" height="180" fill="#E6F3FF" opacity="0.3"/>
  
  <!-- Right Wall with Glass Doors -->
  <rect x="850" y="100" width="300" height="600" fill="url(#wood)" stroke="#654321" stroke-width="2"/>
  
  <!-- Large Glass Door -->
  <rect x="870" y="120" width="260" height="400" fill="url(#glass)" stroke="#654321" stroke-width="2"/>
  <rect x="880" y="130" width="240" height="380" fill="#E6F3FF" opacity="0.3"/>
  
  <!-- Back Wall with Mixed Doors -->
  <rect x="400" y="100" width="400" height="600" fill="url(#wood)" stroke="#654321" stroke-width="2"/>
  
  <!-- Wooden Door Center -->
  <rect x="500" y="150" width="200" height="250" fill="url(#wood)" stroke="#654321" stroke-width="2"/>
  <circle cx="600" cy="275" r="8" fill="#FFD700"/>
  
  <!-- Glass Doors Side -->
  <rect x="420" y="150" width="60" height="200" fill="url(#glass)" stroke="#654321" stroke-width="2"/>
  <rect x="430" y="160" width="40" height="180" fill="#E6F3FF" opacity="0.3"/>
  
  <rect x="720" y="150" width="60" height="200" fill="url(#glass)" stroke="#654321" stroke-width="2"/>
  <rect x="730" y="160" width="40" height="180" fill="#E6F3FF" opacity="0.3"/>
  
  <!-- Dining Table -->
  <rect x="450" y="450" width="300" height="200" fill="url(#diningTable)" stroke="#8B7355" stroke-width="3"/>
  
  <!-- Table Legs -->
  <rect x="470" y="650" width="20" height="50" fill="url(#diningTable)" stroke="#8B7355" stroke-width="1"/>
  <rect x="510" y="650" width="20" height="50" fill="url(#diningTable)" stroke="#8B7355" stroke-width="1"/>
  <rect x="670" y="650" width="20" height="50" fill="url(#diningTable)" stroke="#8B7355" stroke-width="1"/>
  <rect x="710" y="650" width="20" height="50" fill="url(#diningTable)" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Chairs -->
  <rect x="430" y="480" width="60" height="80" fill="url(#diningTable)" stroke="#8B7355" stroke-width="1"/>
  <rect x="710" y="480" width="60" height="80" fill="url(#diningTable)" stroke="#8B7355" stroke-width="1"/>
  <rect x="570" y="480" width="60" height="80" fill="url(#diningTable)" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Ceiling -->
  <rect x="0" y="0" width="1200" height="100" fill="#F5F5DC"/>
  
  <!-- Ceiling Lights -->
  <circle cx="200" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  <circle cx="400" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  <circle cx="600" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  <circle cx="800" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  <circle cx="1000" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  
  <!-- Wood Grain Details -->
  <path d="M 80 150 Q 100 140 120 150 Q 140 160 160 150 Q 180 140 200 150" stroke="#654321" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M 80 250 Q 100 240 120 250 Q 140 260 160 250 Q 180 240 200 250" stroke="#654321" stroke-width="1" fill="none" opacity="0.3"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#654321">معرض داخلي مع أبواب خشبية وزجاجية</text>
</svg>
