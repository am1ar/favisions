<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f6f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A0522D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DEB887;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F5DEB3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DEB887;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wall" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5F5DC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E6E6FA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  
  <!-- Floor -->
  <rect x="0" y="700" width="1200" height="100" fill="#D2B48C"/>
  
  <!-- Wall -->
  <rect x="0" y="0" width="1200" height="700" fill="url(#wall)"/>
  
  <!-- Integrated Media Unit - Full Wall Width -->
  <rect x="50" y="400" width="1100" height="300" fill="url(#wood)" stroke="#654321" stroke-width="3"/>
  
  <!-- TV Section -->
  <rect x="100" y="420" width="400" height="200" fill="url(#lightWood)" stroke="#654321" stroke-width="2"/>
  <rect x="110" y="430" width="380" height="180" fill="#000000" opacity="0.8"/>
  <rect x="120" y="440" width="360" height="160" fill="#1E90FF" opacity="0.3"/>
  
  <!-- Left Storage Section -->
  <rect x="50" y="420" width="40" height="200" fill="url(#wood)" stroke="#654321" stroke-width="1"/>
  <rect x="55" y="430" width="30" height="30" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  <rect x="55" y="470" width="30" height="30" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  <rect x="55" y="510" width="30" height="30" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  <rect x="55" y="550" width="30" height="30" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  
  <!-- Right Storage Section -->
  <rect x="1110" y="420" width="40" height="200" fill="url(#wood)" stroke="#654321" stroke-width="1"/>
  <rect x="1115" y="430" width="30" height="30" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  <rect x="1115" y="470" width="30" height="30" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  <rect x="1115" y="510" width="30" height="30" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  <rect x="1115" y="550" width="30" height="30" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  
  <!-- Center Storage Section -->
  <rect x="550" y="420" width="100" height="200" fill="url(#wood)" stroke="#654321" stroke-width="1"/>
  <rect x="560" y="430" width="80" height="40" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  <rect x="560" y="480" width="80" height="40" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  <rect x="560" y="530" width="80" height="40" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  <rect x="560" y="580" width="80" height="40" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  
  <!-- Right Storage Section -->
  <rect x="700" y="420" width="400" height="200" fill="url(#wood)" stroke="#654321" stroke-width="1"/>
  
  <!-- Drawer Divisions -->
  <rect x="720" y="440" width="80" height="60" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  <rect x="820" y="440" width="80" height="60" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  <rect x="920" y="440" width="80" height="60" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  <rect x="1020" y="440" width="60" height="60" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  
  <rect x="720" y="520" width="80" height="60" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  <rect x="820" y="520" width="80" height="60" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  <rect x="920" y="520" width="80" height="60" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  <rect x="1020" y="520" width="60" height="60" fill="url(#lightWood)" stroke="#654321" stroke-width="1"/>
  
  <!-- Drawer Handles -->
  <rect x="740" y="465" width="40" height="4" fill="#FFD700"/>
  <rect x="840" y="465" width="40" height="4" fill="#FFD700"/>
  <rect x="940" y="465" width="40" height="4" fill="#FFD700"/>
  <rect x="1040" y="465" width="20" height="4" fill="#FFD700"/>
  
  <rect x="740" y="545" width="40" height="4" fill="#FFD700"/>
  <rect x="840" y="545" width="40" height="4" fill="#FFD700"/>
  <rect x="940" y="545" width="40" height="4" fill="#FFD700"/>
  <rect x="1040" y="545" width="20" height="4" fill="#FFD700"/>
  
  <!-- Sofa -->
  <rect x="100" y="200" width="300" height="150" fill="#8B4513" stroke="#654321" stroke-width="2"/>
  <rect x="110" y="210" width="280" height="130" fill="#A0522D" stroke="#654321" stroke-width="1"/>
  
  <!-- Coffee Table -->
  <rect x="450" y="300" width="200" height="80" fill="url(#lightWood)" stroke="#8B7355" stroke-width="2"/>
  <rect x="460" y="310" width="180" height="60" fill="url(#wood)" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Table Legs -->
  <rect x="470" y="380" width="15" height="20" fill="url(#lightWood)" stroke="#8B7355" stroke-width="1"/>
  <rect x="510" y="380" width="15" height="20" fill="url(#lightWood)" stroke="#8B7355" stroke-width="1"/>
  <rect x="650" y="380" width="15" height="20" fill="url(#lightWood)" stroke="#8B7355" stroke-width="1"/>
  <rect x="690" y="380" width="15" height="20" fill="url(#lightWood)" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Ceiling -->
  <rect x="0" y="0" width="1200" height="100" fill="#F5F5DC"/>
  
  <!-- Ceiling Lights -->
  <circle cx="200" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  <circle cx="400" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  <circle cx="600" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  <circle cx="800" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  <circle cx="1000" cy="80" r="20" fill="#FFD700" opacity="0.6"/>
  
  <!-- Wood Grain Details -->
  <path d="M 60 450 Q 80 440 100 450 Q 120 460 140 450 Q 160 440 180 450" stroke="#654321" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M 60 500 Q 80 490 100 500 Q 120 510 140 500 Q 160 490 180 500" stroke="#654321" stroke-width="1" fill="none" opacity="0.3"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#654321">غرفة معيشة مع وحدة وسائط خشبية مدمجة</text>
</svg>
