<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f6f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="walnut" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3E2723;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5D4037;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3E2723;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkWalnut" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1B0F00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2E1A0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B0F00;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="mirror" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#E6F3FF;stop-opacity:0.6" />
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  
  <!-- Floor -->
  <rect x="0" y="700" width="1200" height="100" fill="#D2B48C"/>
  
  <!-- Main Wardrobe Structure -->
  <rect x="200" y="150" width="800" height="500" fill="url(#walnut)" stroke="#1B0F00" stroke-width="3"/>
  
  <!-- Left Section - Storage -->
  <rect x="220" y="170" width="200" height="60" fill="url(#darkWalnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="220" y="250" width="200" height="60" fill="url(#darkWalnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="220" y="330" width="200" height="60" fill="url(#darkWalnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="220" y="410" width="200" height="60" fill="url(#darkWalnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="220" y="490" width="200" height="60" fill="url(#darkWalnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="220" y="570" width="200" height="60" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  
  <!-- Right Section - Storage -->
  <rect x="780" y="170" width="200" height="60" fill="url(#darkWalnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="780" y="250" width="200" height="60" fill="url(#darkWalnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="780" y="330" width="200" height="60" fill="url(#darkWalnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="780" y="410" width="200" height="60" fill="url(#darkWalnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="780" y="490" width="200" height="60" fill="url(#darkWalnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="780" y="570" width="200" height="60" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  
  <!-- Central Mirror - Large and Prominent -->
  <rect x="450" y="180" width="300" height="320" fill="url(#mirror)" stroke="url(#gold)" stroke-width="6"/>
  <rect x="460" y="190" width="280" height="300" fill="#E6F3FF" opacity="0.3"/>
  
  <!-- Mirror Frame Details -->
  <rect x="440" y="170" width="320" height="340" fill="none" stroke="url(#gold)" stroke-width="8"/>
  
  <!-- Decorative Corner Elements -->
  <path d="M 440 170 L 460 150 L 480 170" fill="url(#gold)" stroke="#1B0F00" stroke-width="2"/>
  <path d="M 760 170 L 780 150 L 800 170" fill="url(#gold)" stroke="#1B0F00" stroke-width="2"/>
  <path d="M 440 510 L 460 530 L 480 510" fill="url(#gold)" stroke="#1B0F00" stroke-width="2"/>
  <path d="M 760 510 L 780 530 L 800 510" fill="url(#gold)" stroke="#1B0F00" stroke-width="2"/>
  
  <!-- Mirror Reflections -->
  <path d="M 470 200 L 490 200 L 490 220 L 470 220 Z" fill="#FFFFFF" opacity="0.4"/>
  <path d="M 470 250 L 490 250 L 490 270 L 470 270 Z" fill="#FFFFFF" opacity="0.4"/>
  <path d="M 470 300 L 490 300 L 490 320 L 470 320 Z" fill="#FFFFFF" opacity="0.4"/>
  
  <!-- Bottom Drawers -->
  <rect x="400" y="550" width="400" height="100" fill="url(#walnut)" stroke="#1B0F00" stroke-width="2"/>
  
  <!-- Drawer Divisions -->
  <rect x="420" y="570" width="80" height="60" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="520" y="570" width="80" height="60" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="620" y="570" width="80" height="60" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="720" y="570" width="80" height="60" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  
  <!-- Drawer Handles -->
  <rect x="440" y="595" width="40" height="4" fill="url(#gold)"/>
  <rect x="540" y="595" width="40" height="4" fill="url(#gold)"/>
  <rect x="640" y="595" width="40" height="4" fill="url(#gold)"/>
  <rect x="740" y="595" width="40" height="4" fill="url(#gold)"/>
  
  <!-- Left Side Drawers -->
  <rect x="220" y="550" width="200" height="100" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="240" y="570" width="60" height="40" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="320" y="570" width="60" height="40" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="240" y="620" width="60" height="20" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="320" y="620" width="60" height="20" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  
  <!-- Right Side Drawers -->
  <rect x="780" y="550" width="200" height="100" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="800" y="570" width="60" height="40" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="880" y="570" width="60" height="40" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="800" y="620" width="60" height="20" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  <rect x="880" y="620" width="60" height="20" fill="url(#walnut)" stroke="#1B0F00" stroke-width="1"/>
  
  <!-- Ceiling -->
  <rect x="0" y="0" width="1200" height="100" fill="#F5F5DC"/>
  
  <!-- Ceiling Lights -->
  <circle cx="200" cy="80" r="20" fill="url(#gold)" opacity="0.6"/>
  <circle cx="400" cy="80" r="20" fill="url(#gold)" opacity="0.6"/>
  <circle cx="600" cy="80" r="20" fill="url(#gold)" opacity="0.6"/>
  <circle cx="800" cy="80" r="20" fill="url(#gold)" opacity="0.6"/>
  <circle cx="1000" cy="80" r="20" fill="url(#gold)" opacity="0.6"/>
  
  <!-- Wood Grain Details -->
  <path d="M 230 200 Q 250 190 270 200 Q 290 210 310 200 Q 330 190 350 200" stroke="#1B0F00" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 230 300 Q 250 290 270 300 Q 290 310 310 300 Q 330 290 350 300" stroke="#1B0F00" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 230 400 Q 250 390 270 400 Q 290 410 310 400 Q 330 390 350 400" stroke="#1B0F00" stroke-width="1" fill="none" opacity="0.4"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1B0F00">خزانة ملابس فاخرة مع مرآة مركزية</text>
</svg>
